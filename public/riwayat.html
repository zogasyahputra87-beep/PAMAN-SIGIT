<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | E-Consulting Inspektorat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-[#1F2937] text-gray-300 flex-shrink-0 hidden md:flex flex-col">
            <div class="p-8 border-b border-gray-700">
                <div class="flex items-center space-x-3 mb-2">
                    <div class="w-8 h-8 bg-gray-600 rounded flex items-center justify-center font-bold text-white">E</div>
                    <h1 class="text-xl font-bold tracking-tight text-white">E-CONSULTING</h1>
                </div>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-tight">Inspektorat Daerah<br>Kabupaten Malang</p>
            </div>
            
            <nav class="flex-1 mt-6 px-4 space-y-1">
                <a href="index.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">
                    <span class="mr-3"></span> Dashboard
                </a>
                <a href="buat-konsultasi.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">
                    <span class="mr-3"></span> Buat Konsultasi
                </a>
                <a href="riwayat.html" class="bg-gray-700 text-white w-full flex items-center p-3 rounded-lg text-sm font-bold border-r-4 border-gray-400">
                    <span class="mr-3"></span> Riwayat Konsultasi
                </a>
            </nav>

            <div class="p-6 border-t border-gray-700">
                <div class="bg-gray-800 p-4 rounded-lg">
                    <p class="text-[10px] text-gray-500 uppercase mb-1">Pengembang</p>
                    <p class="text-xs font-bold text-gray-300 uppercase tracking-tighter">Ananda Zoga Syahputra</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center px-8 h-20 flex-shrink-0">
                <h2 class="text-lg font-bold text-gray-800 uppercase tracking-wide">Daftar Riwayat Konsultasi</h2>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p class="text-xs font-bold text-gray-700">Administrator</p>
                        <p class="text-[10px] text-gray-400">Aktualisasi Latsar 2026</p>
                    </div>
                    <div class="w-10 h-10 bg-gray-100 rounded-full border border-gray-200 flex items-center justify-center text-xl shadow-inner">👤</div>
                </div>
            </header>
<main class="flex-1 overflow-y-auto">
            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr class="text-[10px] text-gray-400 uppercase font-bold">
                                <th class="p-5">Instansi</th>
                                <th class="p-5">Judul & Jenis</th>
                                <th class="p-5">Status</th>
                                <th class="p-5 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="consultList" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function loadData() {
            const data = JSON.parse(localStorage.getItem('consultations')) || [];
            const listTable = document.getElementById('consultList');
            listTable.innerHTML = data.map((item, index) => `
                <tr>
                    <td class="p-5 font-bold text-sm">${item.opd}</td>
                    <td class="p-5">
                        <div class="text-sm font-bold">${item.subject}</div>
                        <div class="text-xs text-gray-400">${item.type}</div>
                    </td>
                    <td class="p-5"><span class="px-2 py-1 bg-yellow-100 text-yellow-700 text-[10px] font-bold rounded">${item.status}</span></td>
                    <td class="p-5 text-center">
                        <button onclick="deleteData(${index})" class="text-red-400 hover:text-red-600 text-xs">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteData(index) {
            if(confirm('Hapus?')) {
                const data = JSON.parse(localStorage.getItem('consultations'));
                data.splice(index, 1);
                localStorage.setItem('consultations', JSON.stringify(data));
                loadData();
            }
        }
        loadData();
    </script>
</body>
</html>
