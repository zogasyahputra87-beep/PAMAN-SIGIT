<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | E-Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-gray-900 text-gray-300 flex-shrink-0 flex flex-col">
            <div class="p-8 border-b border-gray-800 text-center">
                <h1 class="text-xl font-black text-white">ADMIN PANEL</h1>
                <p class="text-[9px] text-gray-500 uppercase font-bold">Internal Inspektorat</p>
            </div>
            <nav class="flex-1 mt-6 px-4">
                <div class="bg-blue-600/10 text-blue-400 p-3 rounded-lg text-sm font-bold border-l-4 border-blue-500">🛡️ Kelola Data</div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 px-8 h-20 flex justify-between items-center shadow-sm">
                <h2 class="font-bold text-gray-800">MODERASI KONSULTASI</h2>
                <button onclick="location.reload()" class="bg-gray-100 px-4 py-2 rounded text-xs font-bold hover:bg-gray-200">🔄 REFRESH</button>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr class="text-[10px] text-gray-400 font-bold uppercase">
                                <th class="p-5">Instansi</th>
                                <th class="p-5">Masalah</th>
                                <th class="p-5 text-center">Status</th>
                                <th class="p-5 text-center">Tindakan Admin</th>
                            </tr>
                        </thead>
                        <tbody id="adminBody" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz61JFHQZumYdYQJUS09wY6NqTXfWMaegnb3QW5AfLS8Ppr7NPLQpK-fqEoP_JOXrKt/exec";

        async function fetchAdmin() {
            const res = await fetch(API_URL);
            const data = await res.json();
            document.getElementById('adminBody').innerHTML = data.reverse().map(item => `
                <tr>
                    <td class="p-5 align-middle font-bold text-sm">${item.opd}</td>
                    <td class="p-5 align-middle text-sm">${item.judul}</td>
                    <td class="p-5 text-center align-middle">
                        <div class="flex justify-center">
                            <span class="inline-block w-24 py-1 text-[10px] font-bold rounded-full border text-center ${item.status === 'Selesai' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                                ${item.status}
                            </span>
                        </div>
                    </td>
                    <td class="p-5 text-center align-middle">
                        <div class="flex justify-center space-x-2">
                            ${item.status !== 'Selesai' ? `<button onclick="updateStatus(${item.id}, 'Selesai')" class="bg-blue-600 text-white px-3 py-1 rounded text-[10px] font-bold hover:bg-blue-700">✓ SELESAI</button>` : `<span class="text-green-500 font-bold text-[10px]">TUNTAS</span>`}
                            <a href="https://wa.me/${item.whatsapp}" target="_blank" class="bg-gray-200 px-3 py-1 rounded text-[10px] font-bold hover:bg-gray-300">WA</a>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(row, status) {
            if(!confirm("Ubah status menjadi Selesai?")) return;
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "update_status", row: row, status_baru: status })
            });
            alert("Status Diperbarui!");
            fetchAdmin();
        }
        window.onload = fetchAdmin;
    </script>
</body>
</html>
