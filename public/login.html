<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PAMAN SIGIT - Layanan Konsultasi Digital Inspektorat Daerah Kabupaten Malang.">
    <meta name="google-site-verification" content="PThX0k0-0mpfE8h8zCusaP9iocfEovlLdAcA1qYBJ80" />
    
    <title>Login | PAMAN SIGIT Inspektorat Daerah Kabupaten Malang</title>
    <link rel="icon" type="image/png" href="../pages/logo_kab.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(30, 41, 59, 0.75)), 
                        url('../pages/gambar_kantor.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            user-select: none;
            -webkit-user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div id="loginCard" class="glass-card w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden animate__animated animate__fadeInDown">
        <div class="p-8 text-center bg-white/50 border-b border-gray-100">
            <div class="mb-4 flex justify-center">
                <img src="../pages/logo_kab.png" alt="Logo Kabupaten Malang" class="h-20 w-auto drop-shadow-md">
            </div>
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">PAMAN SIGIT</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Layanan Konsultasi Digital Kabupaten Malang</p>
            <p class="text-[9px] text-blue-500 uppercase tracking-tight font-extrabold mt-1">Inspektorat Daerah Kabupaten Malang</p>
        </div>

        <div class="p-8 space-y-5">
            <button type="button" id="startGateBtn" onclick="revealLoginForm()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all active:scale-95 uppercase tracking-widest text-sm animate__animated animate__pulse animate__infinite">
                LOGIN
            </button>

            <form id="loginForm" class="hidden space-y-5 animate__animated animate__fadeInUp">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Username</label>
                    <input type="text" id="username" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition font-bold text-sm" placeholder="Masukkan username" required autocomplete="off">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Password</label>
                    <input type="password" id="password" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition font-bold text-sm" placeholder="••••••••" required>
                </div>
                
                <button type="submit" id="loginBtn" class="w-full bg-gray-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-gray-900 transition-all active:scale-95 uppercase tracking-widest text-sm">
                    Masuk ke Sistem
                </button>
            </form>
        </div>
        
        <div class="p-6 bg-gray-50/50 text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 uppercase font-bold tracking-tighter">Versi 1.1 - Database Driven</p>
            <p class="text-[8px] text-gray-300 uppercase mt-1">Ananda Zoga Syahputra, S.Tr.I.P.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://afaiwyfodjllolzwbhmz.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_0Jj5RTBAL3gewJvwOsvAxA_aPu370Bl"; 

        // Fungsi Membuka Kotak Formulir Login
        function revealLoginForm() {
            const startBtn = document.getElementById('startGateBtn');
            const loginForm = document.getElementById('loginForm');
            
            startBtn.classList.add('hidden'); // Sembunyikan tombol gerbang masuk awal
            loginForm.classList.remove('hidden'); // Tampilkan form login dengan animasi fadeInUp
            document.getElementById('username').focus(); // Otomatis fokus ke field username
        }

        // Handler Proses Login Form
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const card = document.getElementById('loginCard');

            btn.innerHTML = `<span class="inline-block animate-spin mr-2">⏳</span> VERIFIKASI...`;
            btn.disabled = true;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/users_opd?username=eq.${userIn}&password=eq.${passIn}&select=*`, {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });

                const data = await response.json();

                if (data.length > 0) {
                    const user = data[0];
                    
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userName', user.username);
                    sessionStorage.setItem('namaOpd', user.nama_opd);
                    sessionStorage.setItem('userRole', user.role);
                    sessionStorage.setItem('wilayah', user.wilayah || 'semua');

                    Swal.fire({
                        title: 'LOGIN BERHASIL',
                        text: `Selamat Datang, ${user.nama_opd}`,
                        icon: 'success',
                        showConfirmButton: false,
                        timer: 1500,
                        customClass: { popup: 'rounded-3xl' }
                    }).then(() => {
                        if (user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    });
                } else {
                    throw new Error("Username atau Password salah!");
                }

            } catch (error) {
                btn.innerHTML = "Masuk ke Sistem";
                btn.disabled = false;
                
                card.classList.remove('animate__fadeInDown', 'animate__headShake');
                void card.offsetWidth; 
                card.shadowOffset = card.offsetWidth;
                card.classList.add('animate__headShake');

                Swal.fire({
                    title: 'AKSES DITOLAK',
                    text: error.message,
                    icon: 'error',
                    confirmButtonColor: '#1F2937',
                    customClass: { popup: 'rounded-3xl' }
                });
            }
        });

        // Proteksi Klik Kanan
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
