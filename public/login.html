<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PAMAN SIGIT - Layanan Konsultasi Digital Inspektorat Daerah Kabupaten Malang.">
    <meta name="google-site-verification" content="PThX0k0-0mpfE8h8zCusaP9iocfEovlLdAcA1qYBJ80" />
    
    <title>Login | PAMAN SIGIT Inspektorat Daerah Kabupaten Malang</title>
    <link rel="icon" type="image/png" href="../pages/logo_kab.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(17, 24, 39, 0.85)), 
                        url('../pages/gambar_kantor.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            user-select: none;
            -webkit-user-select: none;
        }
        /* PERTAJAM: Kaca Kristal Ultra-HD dengan optimasi rendering di IOS/Android mobile */
        .glass-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.85), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }
        .hd-input:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.35);
            border-color: rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 md:p-12">

    <!-- PERBAIKAN: w-11/12 sm:w-full untuk menjaga margin aman di sisi kanan-kiri layar HP -->
    <div id="loginCard" class="glass-card w-11/12 sm:w-full max-w-4xl rounded-[24px] md:rounded-[32px] overflow-hidden animate__animated animate__fadeInDown">
        
        <!-- HEADER AREA: Dibuat responsif dinamis -->
        <div class="p-6 sm:p-10 md:p-14 text-center border-b border-white/10 bg-black/10">
            <div class="mb-4 md:mb-6 flex justify-center">
                <!-- Ukuran logo menyusut proporsional di HP -->
                <img src="../pages/logo_kab.png" alt="Logo Kabupaten Malang" class="h-16 sm:h-20 md:h-28 w-auto filter drop-shadow-[0_10px_15px_rgba(0,0,0,0.4)]">
            </div>
            <!-- PERBAIKAN: text-3xl di HP agar tidak patah baris, text-5xl/6xl otomatis di laptop -->
            <h1 class="text-3xl sm:text-5xl md:text-6xl font-black text-white uppercase tracking-tighter mb-2 md:mb-3 subpixel-antialiased">PAMAN SIGIT</h1>
            <p class="text-[10px] sm:text-xs md:text-sm text-gray-300 uppercase tracking-widest font-extrabold antialiased px-2">Layanan Konsultasi Digital Kabupaten Malang</p>
            <p class="text-[9px] sm:text-xs text-blue-400 uppercase tracking-wider font-black mt-1 md:mt-2">Inspektorat Daerah Kabupaten Malang</p>
        </div>

        <!-- FORM & GATE AREA -->
        <div class="p-6 sm:p-10 md:p-14 space-y-6">
            <button type="button" id="startGateBtn" onclick="revealLoginForm()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black py-4 md:py-5 rounded-xl md:rounded-2xl shadow-xl hover:from-blue-700 hover:to-indigo-700 transition-all duration-300 active:scale-[0.96] uppercase tracking-widest text-xs sm:text-sm md:text-base animate__animated animate__pulse animate__infinite">
                LOGIN
            </button>

            <form id="loginForm" class="hidden space-y-5 md:space-y-6 animate__animated animate__fadeInUp">
                <div class="grid grid-cols-1 gap-4 md:gap-6">
                    <div>
                        <label class="block text-[10px] sm:text-xs font-black text-gray-300 uppercase mb-2 tracking-wider">Username</label>
                        <input type="text" id="username" class="hd-input w-full p-3.5 md:p-4.5 bg-black/20 border border-white/10 rounded-xl outline-none text-white transition-all duration-200 font-bold text-sm md:text-base placeholder-gray-600 backdrop-blur-sm" placeholder="Masukkan username" required autocomplete="off">
                    </div>
                    <div>
                        <label class="block text-[10px] sm:text-xs font-black text-gray-300 uppercase mb-2 tracking-wider">Password</label>
                        <input type="password" id="password" class="hd-input w-full p-3.5 md:p-4.5 bg-black/20 border border-white/10 rounded-xl outline-none text-white transition-all duration-200 font-bold text-sm md:text-base placeholder-gray-600 backdrop-blur-sm" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-amber-500 to-yellow-500 text-gray-900 font-black py-3.5 md:py-4.5 rounded-xl shadow-2xl hover:from-amber-600 hover:to-yellow-600 transition-all duration-300 active:scale-[0.96] uppercase tracking-widest text-xs sm:text-sm md:text-base">
                    Masuk ke Sistem
                </button>
            </form>
        </div>
        
        <!-- FOOTER AREA -->
        <div class="p-4 md:p-6 text-center border-t border-white/10 bg-black/20">
            <p class="text-[9px] sm:text-[10px] text-gray-400 uppercase font-black tracking-widest">Versi 1.1 - Database Driven</p>
            <p class="text-[8px] sm:text-[9px] text-gray-500 uppercase mt-1 font-bold tracking-wider">Ananda Zoga Syahputra, S.Tr.I.P.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://afaiwyfodjllolzwbhmz.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_0Jj5RTBAL3gewJvwOsvAxA_aPu370Bl"; 

        function revealLoginForm() {
            const startBtn = document.getElementById('startGateBtn');
            const loginForm = document.getElementById('loginForm');
            
            startBtn.classList.add('hidden'); 
            loginForm.classList.remove('hidden'); 
            document.getElementById('username').focus(); 
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value.trim();
            
            const btn = document.getElementById('loginBtn');
            const card = document.getElementById('loginCard');

            btn.innerHTML = `<span class="inline-block animate-spin mr-2">⏳</span> VERIFIKASI...`;
            btn.disabled = true;

            try {
                const urlKueri = `${SUPABASE_URL}/rest/v1/users_opd?username=ilike.${encodeURIComponent(userIn)}&password=eq.${encodeURIComponent(passIn)}&select=*`;

                const response = await fetch(urlKueri, {
                    method: "GET",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    }
                });

                if (!response.ok) {
                    const errDetail = await response.text();
                    throw new Error(`Gagal terhubung ke database. Info Teknis: ${errDetail || response.statusText}`);
                }

                const data = await response.json();

                if (data.length > 0) {
                    const user = data[0];
                    
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userName', user.username);
                    sessionStorage.setItem('namaOpd', user.nama_opd);
                    sessionStorage.setItem('userRole', user.role);
                    sessionStorage.setItem('wilayah', user.wilayah || 'semua');

                    Swal.fire({
                        title: 'LOGIN BERHASIL',
                        text: `Selamat Datang, ${user.nama_opd}`,
                        icon: 'success',
                        showConfirmButton: false,
                        timer: 1500,
                        customClass: { popup: 'rounded-[24px]' }
                    }).then(() => {
                        if (user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    });
                } else {
                    throw new Error("Username atau Password salah! Periksa kembali kesesuaian huruf.");
                }

            } catch (error) {
                btn.innerHTML = "Masuk ke Sistem";
                btn.disabled = false;
                
                card.classList.remove('animate__fadeInDown', 'animate__headShake');
                void card.offsetWidth; 
                // PERBAIKAN: Menghapus baris shadowOffset yang tidak valid agar performa script bersih
                card.classList.add('animate__headShake');

                Swal.fire({
                    title: 'AKSES DITOLAK',
                    text: error.message,
                    icon: 'error',
                    confirmButtonColor: '#1F2937',
                    customClass: { popup: 'rounded-[24px]' }
                });
            }
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
